<!DOCTYPE html>
<html lang="en">
<head>+
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoBooth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="photobooth-container">
    <h1>PhotoBooth</h1>
    <button id="start-btn">Start</button>
    
    <div id="camera-section" style="display:none;">
      <video id="video" autoplay playsinline></video>
      <div id="countdown"></div>
    </div>
    
    <div id="filter-selection" style="display:none;">
      <h2>Select a Filter</h2>
      <button class="filter-btn active" data-filter="none">Natural</button>
      <button class="filter-btn" data-filter="grayscale(100%)">Black & White</button>
      <button class="filter-btn" data-filter="sepia(100%)">Sepia</button>
      <button class="filter-btn" data-filter="brightness(120%) contrast(120%)">Vintage</button>
      <button class="filter-btn" data-filter="hue-rotate(180deg)">Cool</button>
      <button class="filter-btn" data-filter="invert(100%)">Invert</button>
      <br><br>
      <button id="take-photos-btn" style="background: #4CAF50; font-size: 1.3rem; padding: 1.2rem 2.5rem;">Take Photos</button>
    </div>
    
    <div id="photos-section" style="display:none;">
      <h2>Your Photos</h2>
      <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem;">
        <div id="photos"></div>
        <div id="buttons-panel">
          <button id="save-btn">Save Photos</button>
          <button id="restart-btn">Restart</button>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
